name: Build Super Gold 97 German ROM

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Systempakete aktualisieren
        run: |
          sudo apt update
          sudo ACCEPT_EULA=Y apt -y --fix-missing --allow-downgrades upgrade
          sudo apt -y --allow-downgrades install make g++-10 bison git python-is-python3 python3-pip bison pkg-config libpng-dev
          sudo pip install pypng

      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: RGBDS auschecken
        uses: actions/checkout@v4
        with:
          repository: gbdev/rgbds
          path: rgbds
          ref: 'v0.6.1'

      - name: RGBDS installieren
        run: |
          cd rgbds
          make Q=
          sudo make install

      - name: Gold ROM bauen
        run: |
          make -j -k gold
        working-directory: .

      - name: Belegten Speicherplatz prüfen
        run: python3 tools/used_space.py

      - name: Freier Speicherplatz prüfen
        run: |
          python3 tools/free_space.py BANK=all ./pokegold.map | tee free_space.txt

      - name: Bank- und Section-Report erzeugen (Gold)
        run: |
          python3 - <<'PY' > bank_sections_gold.txt
          import re
          from collections import defaultdict
      
          MAPFILE = "pokegold.map"
          NUM_BANKS = 0x80
          BANK_SIZE = 0x4000
      
          bank_re = re.compile(r'^(ROM0 bank|ROMX bank) #(\d+):')
          sec_re = re.compile(r'^\s*SECTION:\s+\$([0-9A-Fa-f]{4})(?:-\$([0-9A-Fa-f]{4}))?.*\["(.*)"\]')
      
          sections = defaultdict(list)
          cur_bank = None
      
          with open(MAPFILE, "r", encoding="utf-8") as f:
              for line in f:
                  m = bank_re.match(line)
                  if m:
                      cur_bank = int(m.group(2))
                      continue
                  if cur_bank is None:
                      continue
                  s = sec_re.match(line)
                  if s:
                      beg = int(s.group(1), 16)
                      end = int(s.group(2), 16) if s.group(2) else beg
                      name = s.group(3)
                      sections[cur_bank].append((beg, end, name))
      
          for b in range(NUM_BANKS):
              sec = sorted(sections.get(b, []), key=lambda x: x[0])
              used = sum(e - a + 1 for a, e, _ in sec)
              free = BANK_SIZE - used
              print(f"Bank ${b:02X}: used {used:5d} (${used:04X}), free {free:5d} (${free:04X}), sections {len(sec)}")
              for a, e, name in sec:
                  print(f"  ${a:04X}-${e:04X}  {name}")
              print()
          PY

      - name: Bank- und Dateigrößen in Summary schreiben
        run: |
          python3 tools/write_space_summary.py pokegold.map --scripts-glob "**/scripts.asm" --scripts-glob "**/*scripts*.asm" > bank_file_report.md

      - name: Dateien hochladen
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pokemon_sg97
          path: |
            *.gbc
            *.map
            used_space.png
            free_space.txt

      - name: Summary schreiben
        if: success()
        run: |
          {
            echo "## ROM Bank and Section Report"
            echo ""
            echo "<details><summary>Show Banks + Sections</summary>"
            echo ""
            echo '```text'
            cat bank_sections_gold.txt
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            cat bank_file_report.md
            echo ""
            echo "<details><summary>Space allocation (shortened)</summary>"
            echo ""
            echo '```text'
            cat free_space.txt
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"