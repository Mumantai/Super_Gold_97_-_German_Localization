name: Build IPS Patch

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ips:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Systempakete aktualisieren
        run: |
          sudo apt update
          sudo apt -y install make g++ flex bison git python-is-python3 python3-pip pkg-config libpng-dev
          sudo pip install pypng

      - name: RGBDS auschecken
        uses: actions/checkout@v4
        with:
          repository: gbdev/rgbds
          path: rgbds
          ref: 'v0.4.0'

      - name: RGBDS bauen und installieren
        run: |
          cd rgbds
          make Q= LDFLAGS="-Wl,--allow-multiple-definition"
          sudo make install

      - name: Build ROM (target)
        run: |
          make -j gold

      - name: Decrypt base ROM
        env:
          BASE_ROM_PASSPHRASE: ${{ secrets.BASE_ROM_PASSPHRASE }}
        run: |
          if [ -z "$BASE_ROM_PASSPHRASE" ]; then
            echo "Missing secret BASE_ROM_PASSPHRASE"
            exit 1
          fi
          gpg --batch --yes --passphrase "$BASE_ROM_PASSPHRASE" \
            -o base.gbc -d base.gbc.gpg

      - name: Verify ROM files exist
        run: |
          test -f base.gbc
          test -f pokemon_sg97.gbc

      - name: Build floating IPS (flips)
        run: |
          git clone --depth 1 https://github.com/Alcaro/Flips.git flips
          cd flips
          TARGET=cli make

      - name: Create IPS patch
        run: |
          mkdir -p dist
          ./flips/flips --create --ips base.gbc pokemon_sg97.gbc dist/Super_Gold_97_German.ips

      - name: Upload IPS artifact
        uses: actions/upload-artifact@v4
        with:
          name: super-gold-97-german-ips
          path: dist/*.ips

      - name: Upload IPS to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ips